[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "blauw-zwart-fan-sim-pipeline"
version = "0.1.0"
requires-python = ">=3.12"
# IANA time zone database for zoneinfo (required on Windows for Europe/Brussels etc.).
dependencies = ["tzdata>=2024.1"]

[project.scripts]
fan_events = "fan_events.cli:main"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.8.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".agents", ".cursor", ".git", ".specify", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
