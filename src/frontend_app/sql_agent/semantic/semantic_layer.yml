version: 1

# ---------------------------------------------------------------------------
# Subjects: primary analytics entities and which mart table owns their KPIs.
# ---------------------------------------------------------------------------
subjects:
  - name: fan
    primary_mart: mart_fan_loyalty
    description: >
      One row per fan. Use mart_fan_loyalty for all fan-level aggregated KPIs
      (spend, attendance counts, favourite items and shops). The public fan
      leaderboard ranks fans by a composite points score derived from these
      columns—see layering rule fan_leaderboard_and_points.
    prefer_mart_when: >
      Fan-level aggregates: total spend, merchandise spend, retail spend,
      matches attended, purchase counts, favourite merch item, favourite shop.
    prefer_event_tables_when: >
      Event-level or row-level detail: individual transaction rows, per-event
      timestamps, Kafka metadata (topic, partition, offset), or match-level
      breakdown not available in the mart.

  - name: match
    primary_mart: mart_match_summary
    description: >
      One row per match. Use mart_match_summary for opponent, venue, kickoff,
      scoreline, reported attendance, capacity utilisation, ticket scan counts,
      and match-day merchandise revenue. It combines one-row-per-match calendar
      metadata with aggregated synthetic event activity.
    prefer_mart_when: >
      Match-level summaries and KPIs: opponent, home/away, scoreline, venue,
      reported attendance, capacity utilisation, ticket scan counts, match-day
      merch revenue, and top merch item.
    prefer_event_tables_when: >
      Event-level detail: individual ticket scans, merch transactions, per-event
      timestamps, Kafka metadata, or fan-level rows within a match.

  - name: proleague_player
    primary_mart: mart_player_season_summary
    description: >
      One row per Pro League player from the scraper (raw_data.player_stats via
      dbt staging, int_player_stats_pivoted, and the mart). Prefer
      mart_player_season_summary for analysis: flattened profile fields, 85+
      pivoted season statistics (goals, assists, passing, duels, defensive,
      goalkeeper, crossing, discipline, territory) and derived rates (per 90,
      pass accuracy, duel win %, shot on target %). All stat columns default to
      0 (no NULLs) — coalesce/derivation lives in int_player_stats_pivoted, the
      mart is a thin join with int_player_profile. Use int_player_stat_lines
      only for rare stat keys not on the mart. Not for synthetic fan events.
    prefer_mart_when: >
      Player-level KPIs and comparisons: goals, assists, minutes, appearances,
      passing (short/long/backward/forward/own-half/opposition-half), duels
      (aerial/ground, won/lost), tackles, clearances, blocks, blocked shots,
      crosses (corners/open play), goalkeeper metrics (catches, punches, drops,
      penalties faced/saved), discipline (yellow/red/straight red), attacking
      detail (headed/left/right foot goals, inside/outside box, penalty goals,
      winning goals), territory (passes own/opposition half), derived rates
      (pass_accuracy_pct, goals_per_90, assists_per_90, duel_win_pct,
      shot_on_target_pct), competition, nationality, scraped_at.
    prefer_event_tables_when: >
      Long-format stat lines or rare keys not pivoted on the mart — use
      int_player_stat_lines. For raw JSON inspection use stg_player_stats
      (profile/stats JSONB).

# ---------------------------------------------------------------------------
# Metrics: named, typed, with units — the canonical list for the LLM.
# ---------------------------------------------------------------------------
metrics:
  - name: total_spend
    table: mart_fan_loyalty
    column: total_spend
    aggregation: sum
    unit: EUR
    description: >
      Combined lifetime spend (merch_total_spend + retail_total_spend). Best
      column for ranking fans by overall commercial value.

  - name: merch_total_spend
    table: mart_fan_loyalty
    column: merch_total_spend
    aggregation: sum
    unit: EUR
    description: Lifetime stadium merchandise spend.

  - name: retail_total_spend
    table: mart_fan_loyalty
    column: retail_total_spend
    aggregation: sum
    unit: EUR
    description: >
      Lifetime retail channel spend (jan_breydel_fan_shop, webshop,
      bruges_city_shop). Does not include stadium merch.

  - name: matches_attended
    table: mart_fan_loyalty
    column: matches_attended
    aggregation: sum
    unit: matches
    description: >
      Number of distinct matches the fan physically attended (ticket_scan
      events).

  - name: merch_purchase_count
    table: mart_fan_loyalty
    column: merch_purchase_count
    aggregation: sum
    unit: transactions
    description: Stadium merchandise purchase transactions.

  - name: retail_purchase_count
    table: mart_fan_loyalty
    column: retail_purchase_count
    aggregation: sum
    unit: transactions
    description: Retail channel purchase transactions.

  - name: match_reported_attendance
    table: mart_match_summary
    column: reported_attendance
    aggregation: sum
    unit: attendees
    description: >
      Reported crowd size per match row from calendar metadata. Summing across
      rows yields total attendance over the selected matches.

  - name: match_ticket_scan_count
    table: mart_match_summary
    column: ticket_scan_count
    aggregation: sum
    unit: scans
    description: >
      Count of ticket_scan events aggregated to one row per match.

  - name: match_merch_revenue
    table: mart_match_summary
    column: merch_revenue
    aggregation: sum
    unit: EUR
    description: >
      Stadium merchandise revenue aggregated to one row per match.

  - name: player_goals
    table: mart_player_season_summary
    column: goals
    aggregation: sum
    unit: goals
    description: >
      Season goals per player row; sum across players for squad totals or
      filters (e.g. by competition).

  - name: player_assists
    table: mart_player_season_summary
    column: assists
    aggregation: sum
    unit: assists
    description: Season assists (when present on the player row).

  - name: player_minutes_played
    table: mart_player_season_summary
    column: minutes_played
    aggregation: sum
    unit: minutes
    description: Total minutes played (competition timePlayed from source).

  - name: player_appearances
    table: mart_player_season_summary
    column: appearances
    aggregation: sum
    unit: appearances
    description: Season appearances when present.

  - name: player_pass_accuracy_pct
    table: mart_player_season_summary
    column: pass_accuracy_pct
    aggregation: avg
    unit: percent
    description: >
      Derived successful passes divided by total passes (0–100). Average for
      group summaries; for single players the row value is already the season
      rate.

  - name: player_goals_per_90
    table: mart_player_season_summary
    column: goals_per_90
    aggregation: avg
    unit: goals_per_90_minutes
    description: Goals per 90 minutes played (derived in int_player_stats_pivoted).

  - name: player_assists_per_90
    table: mart_player_season_summary
    column: assists_per_90
    aggregation: avg
    unit: assists_per_90_minutes
    description: Assists per 90 minutes played (derived).

  - name: player_duel_win_pct
    table: mart_player_season_summary
    column: duel_win_pct
    aggregation: avg
    unit: percent
    description: Duels won / total duels (0–100). Derived; 0 when duels = 0.

  - name: player_shot_on_target_pct
    table: mart_player_season_summary
    column: shot_on_target_pct
    aggregation: avg
    unit: percent
    description: Shots on target / total shots (0–100). Derived; 0 when total_shots = 0.

  - name: player_headed_goals
    table: mart_player_season_summary
    column: headed_goals
    aggregation: sum
    unit: goals
    description: Goals scored with the head.

  - name: player_left_foot_goals
    table: mart_player_season_summary
    column: left_foot_goals
    aggregation: sum
    unit: goals
    description: Goals scored with the left foot.

  - name: player_right_foot_goals
    table: mart_player_season_summary
    column: right_foot_goals
    aggregation: sum
    unit: goals
    description: Goals scored with the right foot.

  - name: player_penalty_goals
    table: mart_player_season_summary
    column: penalty_goals
    aggregation: sum
    unit: goals
    description: Goals from penalty kicks.

  - name: player_winning_goals
    table: mart_player_season_summary
    column: winning_goal
    aggregation: sum
    unit: goals
    description: Match-winning goals scored.

  - name: player_goals_inside_box
    table: mart_player_season_summary
    column: goals_from_inside_box
    aggregation: sum
    unit: goals
    description: Goals scored from inside the penalty box.

  - name: player_goals_outside_box
    table: mart_player_season_summary
    column: goals_from_outside_box
    aggregation: sum
    unit: goals
    description: Goals scored from outside the penalty box.

  - name: player_through_balls
    table: mart_player_season_summary
    column: through_balls
    aggregation: sum
    unit: passes
    description: Through-balls played.

  - name: player_successful_long_passes
    table: mart_player_season_summary
    column: successful_long_passes
    aggregation: sum
    unit: passes
    description: Successful long passes.

  - name: player_successful_short_passes
    table: mart_player_season_summary
    column: successful_short_passes
    aggregation: sum
    unit: passes
    description: Successful short passes.

  - name: player_blocked_shots
    table: mart_player_season_summary
    column: blocked_shots
    aggregation: sum
    unit: shots
    description: Opposition shots blocked by this player.

  - name: player_corners_won
    table: mart_player_season_summary
    column: corners_won
    aggregation: sum
    unit: corners
    description: Corners won (the player drew the corner).

  - name: player_corners_taken
    table: mart_player_season_summary
    column: corners_taken
    aggregation: sum
    unit: corners
    description: Corner kicks delivered by this player.

  - name: player_straight_red_cards
    table: mart_player_season_summary
    column: straight_red_cards
    aggregation: sum
    unit: cards
    description: Straight red cards (excludes second-yellow reds).

  - name: player_catches
    table: mart_player_season_summary
    column: catches
    aggregation: sum
    unit: catches
    description: Goalkeeper catches.

  - name: player_punches
    table: mart_player_season_summary
    column: punches
    aggregation: sum
    unit: punches
    description: Goalkeeper punches.

  - name: player_penalties_faced
    table: mart_player_season_summary
    column: penalties_faced
    aggregation: sum
    unit: penalties
    description: Penalties faced by the goalkeeper.

# ---------------------------------------------------------------------------
# Dimensions: filter/group-by fields and which tables carry them.
# ---------------------------------------------------------------------------
dimensions:
  - name: fan_id
    tables:
      - mart_fan_loyalty
      - merch_purchase
      - retail_purchase
      - match_events
    description: "Unique fan identifier (e.g. 'fan_00042')."

  - name: match_id
    tables:
      - mart_match_summary
      - merch_purchase
      - match_events
      - match_metadata
    description: Match identifier for event-level queries.

  - name: opponent
    tables:
      - mart_match_summary
      - match_metadata
    description: Opposing club for the match.

  - name: encounter_type
    tables:
      - mart_match_summary
      - match_metadata
    description: Whether Club Brugge played the match at home or away.

  - name: home_away
    tables:
      - mart_match_summary
      - match_metadata
    description: Whether Club Brugge was the home or away side.

  - name: venue_label
    tables:
      - mart_match_summary
      - match_metadata
    description: Human-readable stadium / venue label for the match.

  - name: kickoff_local
    tables:
      - mart_match_summary
      - match_metadata
    description: Scheduled kickoff in Europe/Brussels local wall-clock time.

  - name: home_score
    tables:
      - mart_match_summary
      - match_metadata
    description: Goals scored by the home team in the final result.

  - name: away_score
    tables:
      - mart_match_summary
      - match_metadata
    description: Goals scored by the away team in the final result.

  - name: match_result
    tables:
      - mart_match_summary
    description: "Match outcome from Club Brugge's perspective: win, draw, or loss."

  - name: club_home_stadium
    tables:
      - mart_match_summary
    description: Club Brugge home stadium label from the calendar metadata.

  - name: shop
    tables:
      - retail_purchase
      - mart_fan_loyalty
    description: >
      Retail shop name: jan_breydel_fan_shop, webshop, or bruges_city_shop. In
      mart_fan_loyalty, see favourite_shop.

  - name: item
    tables:
      - merch_purchase
      - retail_purchase
    description: >
      Purchased item (e.g. scarf, shirt, poster). In mart_fan_loyalty, see
      favourite_merch_item and favourite_retail_item.

  - name: event_type
    tables:
      - stg_fan_events_ingested
      - match_events
    description: >
      Event type: merch_purchase, retail_purchase, ticket_scan.

  - name: player_id
    tables:
      - mart_player_season_summary
      - int_player_profile
      - int_player_stats_pivoted
      - int_player_stat_lines
      - stg_player_stats
    description: >
      Pro League site player identifier (primary key; column player_id).

  - name: player_slug
    tables:
      - mart_player_season_summary
      - int_player_profile
      - int_player_stat_lines
      - stg_player_stats
    description: >
      URL slug for the player profile on proleague.be (column slug).

  - name: player_display_name
    tables:
      - mart_player_season_summary
      - int_player_profile
      - int_player_stat_lines
      - stg_player_stats
    description: >
      Player display name (column name; unrelated to fan_id or fan nicknames).

  - name: player_position
    tables:
      - mart_player_season_summary
      - int_player_profile
      - stg_player_stats
    description: >
      Playing position labels from the scraper (columns position,
      field_position).

  - name: player_competition
    tables:
      - mart_player_season_summary
      - int_player_profile
      - int_player_stat_lines
      - stg_player_stats
    description: >
      Competition label for the stat row (e.g. Jupiler Pro League, Challenger
      Pro League). Column competition.

  - name: player_nationality
    tables:
      - mart_player_season_summary
    description: Nationality string from flattened profile (mart column nationality).

  - name: stat_key
    tables:
      - int_player_stat_lines
    description: >
      Machine stat key from the scraper JSON (e.g. goals, totalPasses). Use with
      int_player_stat_lines.stat_value.

# ---------------------------------------------------------------------------
# Join paths: only pairs safe for llm_reader (same schema, FK relationship).
# ---------------------------------------------------------------------------
join_paths:
  - from_table: merch_purchase
    to_table: mart_fan_loyalty
    on: "merch_purchase.fan_id = mart_fan_loyalty.fan_id"
    note: Event-level merch rows to fan summary.

  - from_table: retail_purchase
    to_table: mart_fan_loyalty
    on: "retail_purchase.fan_id = mart_fan_loyalty.fan_id"
    note: Event-level retail rows to fan summary.

  - from_table: match_events
    to_table: mart_fan_loyalty
    on: "match_events.fan_id = mart_fan_loyalty.fan_id"
    note: Match-level events to fan summary.

  - from_table: merch_purchase
    to_table: mart_match_summary
    on: "merch_purchase.match_id = mart_match_summary.match_id"
    note: Merchandise event rows to one-row-per-match match summary mart.

  - from_table: match_events
    to_table: mart_match_summary
    on: "match_events.match_id = mart_match_summary.match_id"
    note: Match event rows to one-row-per-match match summary mart.

  - from_table: int_player_stat_lines
    to_table: mart_player_season_summary
    on: "int_player_stat_lines.player_id = mart_player_season_summary.player_id"
    note: Long-format stats to one-row-per-player mart.

  - from_table: int_player_stats_pivoted
    to_table: mart_player_season_summary
    on: "int_player_stats_pivoted.player_id = mart_player_season_summary.player_id"
    note: Wide pivoted stats (already on the mart via thin join); join only when
      querying the intermediate directly.

  - from_table: int_player_profile
    to_table: int_player_stats_pivoted
    on: "int_player_profile.player_id = int_player_stats_pivoted.player_id"
    note: Roster/biographical fields to wide pivoted stats; this is what the mart
      already does.

# ---------------------------------------------------------------------------
# Layering rules: data-driven guidance on which layer to use for each intent.
# ---------------------------------------------------------------------------
layering_rules:
  - id: prefer_mart_for_fan_kpis
    description: >
      For fan-level KPIs (spend, attendance counts, favourite items/shops),
      always prefer mart_fan_loyalty. It is pre-aggregated and is the
      authoritative source for commercial analytics.

  - id: use_event_tables_for_detail
    description: >
      Use merch_purchase, retail_purchase, or match_events only when the
      question requires individual event rows, per-event timestamps, Kafka
      metadata, or match-level detail not available in the mart.

  - id: prefer_match_mart_for_match_kpis
    description: >
      For one-row-per-match questions (opponent, venue, kickoff, attendance,
      scoreline, home/away, match-day merch revenue, scan counts), prefer
      mart_match_summary. Join merch_purchase or match_events to
      mart_match_summary by match_id only when you need event rows plus match
      context.

  - id: staging_is_raw
    description: >
      stg_fan_events_ingested is a raw staging pass-through. Avoid it unless the
      question explicitly needs unparsed JSONB payload or Kafka infrastructure
      fields (topic, partition, offset).

  - id: proleague_player_mart_first
    description: >
      For Pro League squad or player statistics, prefer
      mart_player_season_summary: one row per player with 85+ pivoted metrics
      and derived rates (pass_accuracy_pct, goals_per_90, assists_per_90,
      duel_win_pct, shot_on_target_pct). All stat columns are 0-filled (no
      NULLs) — the pivot/coalesce/derivation logic lives in
      int_player_stats_pivoted and the mart is a thin join with
      int_player_profile. Use int_player_stat_lines for long-format analysis or
      rare stat keys not on the mart; use stg_player_stats only for raw JSONB
      (profile, stats). Do not join to fan commerce tables unless the question
      explicitly links domains.

  - id: fan_leaderboard_and_points
    description: >
      The public fan leaderboard (UI and GET /api/leaderboard) orders fans by a
      composite score built from mart_fan_loyalty. It is not a stored column:
      points = ROUND(1000 * matches_attended + total_spend + 5 *
      merch_purchase_count + 5 * retail_purchase_count). Sort by points
      descending; ties break by matches_attended DESC, then total_spend DESC,
      then fan_id ASC. To reproduce rankings in SQL, compute that expression per
      fan_id and apply the same ORDER BY.

# ---------------------------------------------------------------------------
# Answer style: rules for the second-stage (NL answer) prompt.
# ---------------------------------------------------------------------------
answer_style:
  currency_unit: EUR
  decimal_places: 2
  rules:
    - "State monetary values with the EUR unit, e.g. €42.50, not just 42.5."
    - "Round monetary values to 2 decimal places."
    - "Fan leaderboard / loyalty points are not a mart column: each fan's score
      is ROUND(1000 * matches_attended + total_spend + 5 * merch_purchase_count
      + 5 * retail_purchase_count). Ranking tie-breakers: higher points, then
      more matches_attended, then higher total_spend, then lower fan_id."
    - "State count metrics (matches, transactions) as whole numbers."
    - "If the query returned zero rows, say 'No data was found' — do not guess
      or hallucinate values."
    - "Do not invent values not present in the data rows."
    - "Reference specific fan IDs or item names from the result when relevant."
    - "Keep the answer to 1–3 sentences unless the question explicitly asks for
      a list."
    - "Pro League player analytics: prefer mart_player_season_summary; cite
      player_id or name from results. For int_player_stat_lines, report stat_key
      and stat_value from rows returned. Do not invent stat lines or metrics not
      in the query output."
