# Full fan-sim pipeline: Kafka KRaft + Postgres + pgAdmin + fan-events producer + ingest +
# Pro League scraper (scheduler → Kafka → proleague-ingest) + dbt-scheduler + LLM API.
# Quickstart: specs/005-compose-kafka-pipeline/quickstart.md
#
# Kafka listeners:
#   - EXTERNAL (PLAINTEXT_HOST): host clients use localhost:9092 (optional host fan_events stream).
#   - INTERNAL (PLAINTEXT_INTERNAL): Compose clients use broker:29092 (producer + ingest).
#   - CONTROLLER: KRaft quorum on broker:9093 (not for clients).
# Topics are auto-created on first produce (FR-13); partition count for new topics follows
# KAFKA_NUM_PARTITIONS below (default 3).
#
#   docker compose up -d
#   docker compose down        # stop (data kept in volumes)
#   docker compose down -v     # stop and remove persisted data

services:
  broker:
    # Pin: Docker Hub apache/kafka — use :port listeners (not 0.0.0.0) for KRaft (KAFKA-18281 on 3.9.0).
    image: apache/kafka:4.2.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s

  # Ensure the ingest topic exists before consumers subscribe (avoids UNKNOWN_TOPIC_OR_PART
  # when no producer has run yet). Partition count must match broker KAFKA_NUM_PARTITIONS.
  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      broker:
        condition: service_healthy
    # Topic name from Compose interpolation (same default as ingest/producer). Partition count
    # must stay aligned with broker KAFKA_NUM_PARTITIONS.
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - broker:29092
      - --create
      - --if-not-exists
      - --topic
      - ${KAFKA_TOPIC:-fan_events}
      - --partitions
      - ${KAFKA_NUM_PARTITIONS:-3}
      - --replication-factor
      - "1"
    restart: "no"

  # Create the player_stats scraper topic before the scheduler or ingest consumer start.
  # Partition count must stay aligned with broker KAFKA_NUM_PARTITIONS.
  kafka-init-scraper:
    image: apache/kafka:4.2.0
    depends_on:
      broker:
        condition: service_healthy
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - broker:29092
      - --create
      - --if-not-exists
      - --topic
      - ${SCRAPER_KAFKA_TOPIC:-player_stats}
      - --partitions
      - ${KAFKA_NUM_PARTITIONS:-3}
      - --replication-factor
      - "1"
    restart: "no"

  postgres:
    # Pin: Docker Hub library/postgres — `18-alpine` tracks latest PG 18 on Alpine.
    # Major upgrade: remove/rename `postgres-data` volume or run pg_upgrade (not done here).
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional SELinux relabel suffix for Linux hosts (set POSTGRES_INIT_BIND_OPTS=,Z).
      # Keep empty on Windows/macOS.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro${POSTGRES_INIT_BIND_OPTS:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── dbt scheduler (refresh fan + player marts with upstream parents on a fixed interval) ───
  dbt-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.dbt
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Container-specific connection overrides (not user-configurable via .env).
      DBT_PROFILES_DIR: /app/dbt
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_PORT: 5432
      # DBT_RUN_INTERVAL_MINUTES and DBT_RUN_SELECTOR are intentionally omitted here.
      # They are injected directly from env_file (.env) to avoid Compose YAML interpolation
      # picking up a stale host-shell value and silently overriding the .env setting.
      # See docker/dbt/run-loop.sh for defaults when the variables are unset.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    # Pin: Docker Hub dpage/pgadmin4
    image: dpage/pgadmin4:9.14
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingest
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-fan_events}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-fan-ingest-local}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # ─── Event producer (fan_events stream) ─────────────────────────────────
  # Runs by default with the stack. For an extra host-side producer instead, see
  # specs/005-compose-kafka-pipeline/quickstart.md §3.
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingest
    env_file: .env
    # Logs: Kafka mode does not print each NDJSON line to stdout — stderr gets startup + periodic summaries.
    # Code default is every 256 deliveries; this service sets FAN_EVENTS_KAFKA_PROGRESS_INTERVAL=50 for livelier logs.
    environment:
      PYTHONUNBUFFERED: "1"
      FAN_EVENTS_KAFKA_PROGRESS_INTERVAL: "50"
      FAN_EVENTS_BOOTSTRAP_ENABLED: ${FAN_EVENTS_BOOTSTRAP_ENABLED:-1}
      FAN_EVENTS_BOOTSTRAP_INCLUDE_RETAIL: ${FAN_EVENTS_BOOTSTRAP_INCLUDE_RETAIL:-0}
      FAN_EVENTS_BOOTSTRAP_EMIT_WALL_CLOCK_MIN: ${FAN_EVENTS_BOOTSTRAP_EMIT_WALL_CLOCK_MIN:-0}
      FAN_EVENTS_BOOTSTRAP_EMIT_WALL_CLOCK_MAX: ${FAN_EVENTS_BOOTSTRAP_EMIT_WALL_CLOCK_MAX:-0}
      FAN_EVENTS_BOOTSTRAP_MAX_EVENTS: ${FAN_EVENTS_BOOTSTRAP_MAX_EVENTS:-}
      FAN_EVENTS_BOOTSTRAP_MAX_DURATION_SECONDS: ${FAN_EVENTS_BOOTSTRAP_MAX_DURATION_SECONDS:-}
      FAN_EVENTS_BOOTSTRAP_STATE_DIR: ${FAN_EVENTS_BOOTSTRAP_STATE_DIR:-/var/lib/fan-events-producer}
      FAN_EVENTS_BOOTSTRAP_SENTINEL: ${FAN_EVENTS_BOOTSTRAP_SENTINEL:-/var/lib/fan-events-producer/bootstrap.done}
      FAN_EVENTS_CALENDAR_PATH: /app/match_day.example.json
    command: ["producer-boot-and-stream"]
    volumes:
      - ./match_day.example.json:/app/match_day.example.json:ro
      - producer-bootstrap-state:/var/lib/fan-events-producer
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # ─── Pro League player-stats scraper (HTTP read layer) ───────────────────
  # Serves /squad and /player from the DB / live fetch.
  # Squad data is populated by proleague-scheduler → Kafka → proleague-ingest.
  # IMPORTANT: Operators must verify https://www.proleague.be/robots.txt and
  # Terms of Use before running against the live site.
  proleague-scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Pro League scheduler (daily scrape → Kafka producer) ────────────────
  # Runs scrape_squad once on startup (SCRAPER_RUN_ON_STARTUP=1) then every
  # SCRAPER_INTERVAL_HOURS hours.  Publishes one Kafka message per player to
  # SCRAPER_KAFKA_TOPIC; the proleague-ingest consumer persists them to Postgres.
  # IMPORTANT: see proleague-scraper note above re robots.txt / Terms of Use.
  proleague-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    command: ["python", "-m", "proleague_scraper.scheduler"]
    environment:
      PYTHONUNBUFFERED: "1"
      PROLEAGUE_SQUAD_URL: ${PROLEAGUE_SQUAD_URL:-https://www.proleague.be/teams/club-brugge-kv-182/squad}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      SCRAPER_KAFKA_TOPIC: ${SCRAPER_KAFKA_TOPIC:-player_stats}
      SCRAPER_INTERVAL_HOURS: ${SCRAPER_INTERVAL_HOURS:-24}
      # Set to "1" to run immediately on container start (default); "0" to wait one full interval.
      SCRAPER_RUN_ON_STARTUP: ${SCRAPER_RUN_ON_STARTUP:-1}
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
      kafka-init-scraper:
        condition: service_completed_successfully

  # ─── Pro League ingest (Kafka consumer → Postgres) ───────────────────────
  # Subscribes to SCRAPER_KAFKA_TOPIC and upserts player rows into player_stats.
  # Consumer group SCRAPER_KAFKA_CONSUMER_GROUP is distinct from fan-ingest-local.
  proleague-ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper-ingest
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      SCRAPER_KAFKA_TOPIC: ${SCRAPER_KAFKA_TOPIC:-player_stats}
      SCRAPER_KAFKA_CONSUMER_GROUP: ${SCRAPER_KAFKA_CONSUMER_GROUP:-scraper-ingest-local}
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      kafka-init-scraper:
        condition: service_completed_successfully

  # ─── frontend-app (Flask + Ollama Text-to-SQL) ───────────────────────────
  # Requires Ollama running on the host with `gemma4:e2b` pulled:
  #   ollama pull gemma4:e2b
  # The dbt-scheduler service keeps the marts schema fresh in the background, then query:
  #   curl -s -X POST http://localhost:8080/api/ask \
  #     -H 'Content-Type: application/json' \
  #     -d '{"question": "Who are the top 5 fans by total spend?"}' | jq .
  frontend-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend-app
    env_file: .env
    environment:
      # Keep the service URL aligned with the password provisioned in postgres init.
      LLM_READER_DATABASE_URL: ${LLM_READER_DATABASE_URL}
      DATABASE_URL: ${LLM_READER_DATABASE_URL}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      # LLM provider selection: ollama (default) or openrouter.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      # OpenRouter — only used when LLM_PROVIDER=openrouter. Key is server-side only.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mistral-7b-instruct:free}
      # Persist Ollama/OpenRouter settings from the Club Settings UI across container restarts.
      LLM_CONFIG_PATH: ${LLM_CONFIG_PATH:-/data/llm_config.json}
      # Internal URL of the scraper service (used by /api/player-stats/player and /image proxy).
      # /api/player-stats/squad now reads from Postgres directly — no scraper dependency at startup.
      PROLEAGUE_SCRAPER_URL: ${PROLEAGUE_SCRAPER_URL:-http://proleague-scraper:8001}
    ports:
      - "${LLM_API_PORT:-8080}:8080"
    # `host-gateway` makes host.docker.internal resolve to the Docker bridge IP
    # on Linux hosts; Docker Desktop on Windows/macOS adds it automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - frontend-app-config:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kafka-data:
  postgres-data:
  frontend-app-config:
  producer-bootstrap-state:
