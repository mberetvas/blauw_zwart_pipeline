name: Pytest

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run pytest
        run: uv run pytest
