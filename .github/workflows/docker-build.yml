name: Docker Build

on:
    push:
        branches:
            - master
        paths:
            - "docker/**"
            - "pyproject.toml"
            - "uv.lock"
            - "src/**"
            - "dbt/**"
            - ".github/workflows/docker-build.yml"
    pull_request:
        branches:
            - master
        paths:
            - "docker/**"
            - "pyproject.toml"
            - "uv.lock"
            - "src/**"
            - "dbt/**"
            - ".github/workflows/docker-build.yml"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: ingest
                      dockerfile: docker/Dockerfile.ingest
                    - image: scraper
                      dockerfile: docker/Dockerfile.scraper
                    - image: scraper-ingest
                      dockerfile: docker/Dockerfile.scraper-ingest
                    - image: dbt
                      dockerfile: docker/Dockerfile.dbt
                    - image: frontend-app
                      dockerfile: docker/Dockerfile.frontend-app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build ${{ matrix.image }}
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: false
                  tags: blauw-zwart/${{ matrix.image }}:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
