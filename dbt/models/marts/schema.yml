version: 2

models:
  - name: mart_dbt_run_results
    description: >
      Observability mart: one row per dbt node (model, test, snapshot, seed) per
      invocation. Populated by the `log_dbt_results` macro that runs as an
      `on-run-end` hook after every `dbt build` / `dbt run` / `dbt test`. Use
      this to track success/failure history, error messages, slow models, and
      recurring test failures over time.
    config:
      materialized: view
      tags: [ mart, observability ]
    columns:
      - name: invocation_id
        description: Unique id for the dbt invocation that produced this row.
        tests:
          - not_null
      - name: run_started_at
        description: UTC timestamp of when the dbt invocation started.
        tests:
          - not_null
      - name: node_unique_id
        description: dbt's internal unique node id, e.g.
          `model.fan_sim_pipeline.mart_fan_loyalty`.
      - name: node_name
        description: Short node name (model/test/snapshot/seed name).
      - name: resource_type
        description: One of `model`, `test`, `snapshot`, `seed`, `operation`.
      - name: status
        description: >
          dbt result status. Models: `success` / `error`. Tests: `pass` / `fail`
          / `error` / `warn`. See dbt RunResult docs.
        tests:
          - not_null
      - name: is_success
        description: Convenience boolean derived from `status`.
      - name: is_failure
        description: Convenience boolean derived from `status`.
      - name: execution_time_s
        description: Wall-clock execution time in seconds for this node.
      - name: rows_affected
        description: Rows reported by the warehouse adapter (NULL when not applicable).
      - name: failures
        description: Number of failing rows for tests; 0 for models that built successfully.
      - name: message
        description: Free-form status message; populated with the error text on failures.

  - name: mart_fan_loyalty
    description: >
      Fan loyalty mart: one row per fan with lifetime spend and match-attendance
      metrics aggregated from all three event streams (merch_purchase,
      retail_purchase, ticket_scan). Materialised as an incremental table: on
      each dbt run only fans with new source events (ingested after
      last_updated_at) are reprocessed; use `dbt run --full-refresh` to rebuild
      from scratch. Use this table to answer questions such as "Who are the top
      spenders?", "Which fans attend the most matches?", "What is the most
      popular merchandise item?", or "Which retail shop generates the most
      revenue?". All monetary amounts are in euros (EUR).
    config:
      materialized: table
      tags: [ mart, fan_loyalty ]
    columns:
      - name: fan_id
        description: >
          Unique synthetic fan identifier (e.g. "fan_00042"). Primary key of
          this mart. Use this to count fans, rank them, or filter to a specific
          fan.
        data_type: text
        tests:
          - not_null
          - unique

      - name: merch_purchase_count
        description: >
          Number of merchandise purchase transactions made at the stadium
          (event_type = merch_purchase). A fan with 0 has never bought merch.
        data_type: bigint
        tests:
          - not_null

      - name: merch_total_spend
        description: >
          Total euros spent on stadium merchandise across all matches. Includes
          all items: scarves, shirts, posters, etc.
        data_type: numeric
        tests:
          - not_null

      - name: favourite_merch_item
        description: >
          The most frequently purchased merchandise item (e.g. "scarf", "shirt",
          "poster"). NULL when the fan has no merch purchases.
        data_type: text

      - name: retail_purchase_count
        description: >
          Number of retail purchase transactions via non-match channels
          (event_type = retail_purchase). Includes online and physical shops.
        data_type: bigint
        tests:
          - not_null

      - name: retail_total_spend
        description: >
          Total euros spent through retail channels (jan_breydel_fan_shop,
          webshop, bruges_city_shop). Does not include stadium merch.
        data_type: numeric
        tests:
          - not_null

      - name: favourite_retail_item
        description: >
          Most frequently purchased retail item across all non-match channels.
          NULL when the fan has no retail purchases.
        data_type: text

      - name: favourite_shop
        description: >
          The retail shop where the fan shops most often:
          "jan_breydel_fan_shop", "webshop", or "bruges_city_shop". NULL if no
          retail purchases.
        data_type: text

      - name: total_spend
        description: >
          Combined lifetime spend in euros: merch_total_spend +
          retail_total_spend. This is the best column for ranking fans by
          overall value or identifying the biggest spenders. A higher value
          means a more engaged, high-value fan.
        data_type: numeric
        tests:
          - not_null

      - name: matches_attended
        description: >
          Number of distinct matches the fan physically attended, measured by
          ticket_scan events. A value of 0 means the fan has never scanned a
          ticket (may still have made online purchases).
        data_type: bigint
        tests:
          - not_null

      - name: first_match_attended
        description: >
          UTC timestamp of the fan's very first ticket scan (earliest match they
          ever attended). NULL if matches_attended = 0.
        data_type: timestamp with time zone

      - name: last_match_attended
        description: >
          UTC timestamp of the fan's most recent ticket scan (latest match they
          attended). NULL if matches_attended = 0. Useful for identifying fans
          who haven't visited recently (churned) vs. frequent recent attendees.
        data_type: timestamp with time zone

      - name: last_updated_at
        description: >
          Watermark: the maximum ingested_at timestamp across all source records
          (merch_purchase, retail_purchase, match_events) for this fan. Used
          internally by dbt to identify which fans need reprocessing on the next
          incremental run. Not directly useful for end-user Q&A.
        data_type: timestamp with time zone

  - name: mart_match_summary
    description: >
      Match summary mart: one row per match that combines calendar metadata
      (opponent, venue, kickoff, attendance, scoreline, home/away) with
      aggregated synthetic engagement signals from match_events and
      merch_purchase. Materialised as an incremental table: on each dbt run only
      matches with new source events are reprocessed; use `dbt run
      --full-refresh` to rebuild from scratch. Use this table for match-level
      questions such as "Who did Club Brugge play?", "What was the score?", "How
      full was Jan Breydel?", or "Which matches generated the most merchandise
      revenue?".
    config:
      materialized: table
      tags: [ mart, match_summary ]
    columns:
      - name: match_id
        description: Unique match identifier. Primary key of this mart.
        data_type: text
        tests:
          - not_null
          - unique

      - name: kickoff_local
        description: Scheduled kickoff timestamp in Europe/Brussels local time.
        data_type: timestamp without time zone

      - name: timezone
        description: IANA timezone label carried from the calendar source.
        data_type: text

      - name: home_away
        description: >
          Whether Club Brugge played at home or away for this match.
        data_type: text

      - name: encounter_type
        description: >
          Duplicate friendly label for home/away context from the source
          calendar.
        data_type: text

      - name: opponent
        description: Opposing club for the fixture.
        data_type: text

      - name: venue_label
        description: Human-readable venue or stadium label for the fixture.
        data_type: text

      - name: home_score
        description: Goals scored by the home team in the final result.
        data_type: integer

      - name: away_score
        description: Goals scored by the away team in the final result.
        data_type: integer

      - name: club_brugge_score
        description: >
          Goals scored by Club Brugge, derived from home_score/away_score using
          home_away.
        data_type: integer

      - name: opponent_score
        description: >
          Goals conceded to the opponent, derived from home_score/away_score.
        data_type: integer

      - name: match_result
        description: >
          Match outcome from Club Brugge's perspective: win, draw, or loss.
        data_type: text

      - name: reported_attendance
        description: >
          Reported crowd size from the calendar source, distinct from synthetic
          ticket_scan counts in this mart.
        data_type: integer

      - name: match_event_count
        description: >
          Total ingested match-linked events for the fixture across ticket_scan
          and merch_purchase rows.
        data_type: bigint

      - name: ticket_scan_count
        description: Number of ticket_scan events recorded for the match.
        data_type: bigint

      - name: ticket_scanned_fans
        description: Distinct fans with a ticket_scan event for the match.
        data_type: bigint

      - name: ticket_scan_pct_of_reported_attendance
        description: >
          Ticket scan count divided by reported_attendance, expressed as a
          percentage. Useful for comparing synthetic scans vs reported crowd.
        data_type: numeric

      - name: merch_purchase_count
        description: Number of stadium merchandise purchase events for the match.
        data_type: bigint

      - name: unique_merch_buyers
        description: Distinct fans who made a merch purchase during the match.
        data_type: bigint

      - name: merch_revenue
        description: Total stadium merchandise revenue for the match in EUR.
        data_type: numeric

      - name: top_merch_item
        description: Most frequently purchased merch item for the match.
        data_type: text

      - name: club_home_stadium
        description: Club Brugge home stadium label from top-level venue metadata.
        data_type: text

      - name: club_home_stadium_capacity
        description: Capacity of Club Brugge's home stadium (Jan Breydelstadion).
        data_type: integer

      - name: home_capacity_utilization_pct
        description: >
          Reported attendance as a percentage of club_home_stadium_capacity for
          home matches. NULL for away fixtures.
        data_type: numeric

      - name: is_home_capacity_sellout
        description: >
          TRUE when a home match's reported attendance reaches or exceeds the
          recorded home-stadium capacity; NULL for away matches.
        data_type: boolean

      - name: first_event_time
        description: Earliest event_time observed for the match.
        data_type: timestamp with time zone

      - name: last_event_time
        description: Latest event_time observed for the match.
        data_type: timestamp with time zone

      - name: last_updated_at
        description: >
          Watermark: the latest ingested_at timestamp among source rows used to
          build this match summary. Used by the incremental model.
        data_type: timestamp with time zone

  - name: mart_player_season_summary
    description: >
      Pro League player season summary mart: one row per player with flattened
      profile fields, 85+ pivoted competition statistics (goals, assists,
      minutes, passing, duels, defensive, goalkeeper, crossing, discipline,
      territory) and derived rates (pass_accuracy_pct, goals_per_90,
      assists_per_90, duel_win_pct, shot_on_target_pct). All stat columns are
      coalesced to 0 (no NULLs). Built as a thin join between int_player_profile
      and int_player_stats_pivoted, where the pivot, null-handling, and rate
      derivation live. Prefer this table over raw JSON staging for rankings,
      filters, and aggregates. Refreshed as a table on each dbt run.
    config:
      tags: [ mart, player_stats, proleague ]
    columns:
      - name: player_id
        description: Pro League site player identifier (primary key of this mart).
        data_type: text
        tests:
          - not_null
          - unique
      - name: slug
        data_type: text
        tests:
          - not_null
      - name: name
        data_type: text
        tests:
          - not_null
      - name: competition
        data_type: text
      - name: goals
        data_type: numeric
      - name: assists
        data_type: numeric
      - name: minutes_played
        data_type: numeric
      - name: pass_accuracy_pct
        data_type: numeric
      - name: goals_per_90
        data_type: numeric
      - name: scraped_at
        data_type: timestamp with time zone
        tests:
          - not_null
      - name: games_over_45_minutes
        data_type: numeric
      - name: games_under_45_minutes
        data_type: numeric
      - name: goals_conceded_inside_box
        data_type: numeric
      - name: goals_conceded_outside_box
        data_type: numeric
      - name: times_tackled
        data_type: numeric
      - name: catches
        data_type: numeric
      - name: punches
        data_type: numeric
      - name: drops
        data_type: numeric
      - name: penalties_faced
        data_type: numeric
      - name: goals_from_inside_box
        data_type: numeric
      - name: goals_from_outside_box
        data_type: numeric
      - name: headed_goals
        data_type: numeric
      - name: left_foot_goals
        data_type: numeric
      - name: right_foot_goals
        data_type: numeric
      - name: penalty_goals
        data_type: numeric
      - name: winning_goal
        data_type: numeric
      - name: backward_passes
        data_type: numeric
      - name: through_balls
        data_type: numeric
      - name: successful_long_passes
        data_type: numeric
      - name: unsuccessful_long_passes
        data_type: numeric
      - name: successful_short_passes
        data_type: numeric
      - name: unsuccessful_short_passes
        data_type: numeric
      - name: total_losses_of_possession
        data_type: numeric
      - name: aerial_duels_lost
        data_type: numeric
      - name: ground_duels_lost
        data_type: numeric
      - name: straight_red_cards
        data_type: numeric
      - name: foul_attempted_tackle
        data_type: numeric
      - name: corners_won
        data_type: numeric
      - name: corners_taken
        data_type: numeric
      - name: successful_crosses_corners
        data_type: numeric
      - name: unsuccessful_crosses_corners
        data_type: numeric
      - name: successful_crosses_open_play
        data_type: numeric
      - name: unsuccessful_crosses_open_play
        data_type: numeric
      - name: blocked_shots
        data_type: numeric
      - name: successful_passes_own_half
        data_type: numeric
      - name: unsuccessful_passes_own_half
        data_type: numeric
      - name: successful_passes_opposition_half
        data_type: numeric
      - name: unsuccessful_passes_opposition_half
        data_type: numeric
