version: 2

sources:
  - name: fan_pipeline
    description: >
      Raw relational data produced by the fan-event ingest service (Kafka → Postgres).
      Schema matches docker/postgres/init and ingestion-persistence-v1.
    schema: public
    meta:
      owner: pipeline
      layer: raw
    tables:
      - name: fan_events_ingested
        description: >
          One row per Kafka message: NDJSON payload stored as JSONB plus Kafka coordinates
          and ingest metadata. Unique on (kafka_topic, kafka_partition, kafka_offset).
        identifier: fan_events_ingested
        meta:
          ingestion_contract: ingestion-persistence-v1
        columns:
          - name: id
            description: Surrogate primary key (BIGSERIAL).
            data_type: bigint
          - name: ingested_at
            description: Wall-clock time when the row was inserted by the ingest service.
            data_type: timestamp with time zone
          - name: kafka_topic
            description: Kafka topic name for the originating message.
            data_type: text
          - name: kafka_partition
            description: Non-negative Kafka partition index.
            data_type: integer
          - name: kafka_offset
            description: Kafka offset within the partition.
            data_type: bigint
          - name: event_type
            description: >
              Top-level JSON `event` string when present; otherwise ingest maps to sentinel `unknown`.
            data_type: text
          - name: event_time
            description: Business event timestamp from the payload when available.
            data_type: timestamp with time zone
          - name: payload_json
            description: Full parsed event body as JSONB (v2/v3 fan event objects).
            data_type: jsonb
            meta:
              contains_pii: false

models:
  - name: stg_fan_events_ingested
    description: >
      Staging pass-through over the `fan_pipeline.fan_events_ingested` source table for downstream
      intermediate and mart models. Add casts and renames here as the project grows.
    config:
      tags: [staging, fan_events, ingest]
    meta:
      owner: pipeline
      layer: staging
    columns:
      - name: id
        description: Surrogate primary key from the ingest table (BIGSERIAL).
        data_type: bigint
        tests:
          - not_null
          - unique
      - name: ingested_at
        description: Time the ingest service persisted the row.
        data_type: timestamp with time zone
        tests:
          - not_null
      - name: kafka_topic
        description: Kafka topic for the message.
        data_type: text
        tests:
          - not_null
      - name: kafka_partition
        description: Kafka partition index (non-negative).
        data_type: integer
        tests:
          - not_null
      - name: kafka_offset
        description: Offset within the Kafka partition.
        data_type: bigint
        tests:
          - not_null
      - name: event_type
        description: Declared event type from JSON; may be sentinel `unknown` when missing.
        data_type: text
        tests:
          - not_null
      - name: event_time
        description: Business timestamp from the payload when present.
        data_type: timestamp with time zone
      - name: payload_json
        description: Full event JSON (JSONB) for downstream parsing.
        data_type: jsonb
        tests:
          - not_null
