version: 2

models:
  - name: retail_purchase
    description: >
      Ingest rows for retail (non-match) purchases with JSONB payload fields cast to typed columns.
    config:
      tags: [intermediate, fan_events, retail]
    columns:
      - name: id
        description: Surrogate primary key from the ingest table (same as staging).
        data_type: bigint
        tests:
          - not_null
          - unique
      - name: ingested_at
        data_type: timestamp with time zone
        tests:
          - not_null
      - name: kafka_topic
        data_type: text
      - name: kafka_partition
        data_type: integer
      - name: kafka_offset
        data_type: bigint
      - name: event_time
        data_type: timestamp with time zone
      - name: fan_id
        data_type: text
        tests:
          - not_null
      - name: shop
        data_type: text
        tests:
          - not_null
      - name: item
        data_type: text
      - name: amount
        data_type: numeric
        tests:
          - not_null
