version: 2

models:
  - name: int_player_profile
    description: >
      One row per scraped player: roster metadata plus flattened biographical
      fields from the profile JSON (height, weight, birth date, nationality,
      preferred foot). Feeds mart_player_season_summary.
    config:
      tags: [ intermediate, proleague, player_stats ]
    columns:
      - name: player_id
        data_type: text
        tests:
          - not_null
          - unique
      - name: slug
        data_type: text
        tests:
          - not_null
      - name: name
        data_type: text
        tests:
          - not_null
      - name: scraped_at
        data_type: timestamp with time zone
        tests:
          - not_null

  - name: int_player_stat_lines
    description: >
      Long-format competition stats: one row per player and stat key (from the
      stats JSON array). Use for custom pivots, rare metrics, or
      goalkeeper-specific keys not present on the mart.
    config:
      tags: [ intermediate, proleague, player_stats ]
    columns:
      - name: player_id
        data_type: text
        tests:
          - not_null
      - name: stat_key
        data_type: text
        tests:
          - not_null
      - name: stat_value
        data_type: numeric

  - name: int_player_stats_pivoted
    description: >
      One row per player: wide pivot of every tracked stat key from
      int_player_stat_lines. All stat columns are coalesced to 0 (no NULLs) and
      derived rates (per-90, accuracy %) are computed here, returning 0 when the
      denominator is 0. Feeds mart_player_season_summary.
    config:
      tags: [ intermediate, proleague, player_stats ]
    columns:
      - name: player_id
        data_type: text
        tests:
          - not_null
          - unique
