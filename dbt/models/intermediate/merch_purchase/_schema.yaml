version: 2

models:
  - name: merch_purchase
    description: >
      Ingest rows for merchandise purchases with JSONB payload fields cast to
      typed columns, including propagated match metadata when present in the
      payload.
    config:
      tags: [ intermediate, fan_events, merch ]
    columns:
      - name: id
        description: Surrogate primary key from the ingest table (same as staging).
        data_type: bigint
        tests:
          - not_null
          - unique
      - name: ingested_at
        data_type: timestamp with time zone
        tests:
          - not_null
      - name: kafka_topic
        data_type: text
      - name: kafka_partition
        data_type: integer
      - name: kafka_offset
        data_type: bigint
      - name: event_time
        data_type: timestamp with time zone
      - name: fan_id
        data_type: text
        tests:
          - not_null
      - name: match_id
        data_type: text
        tests:
          - not_null
      - name: kickoff_local
        data_type: text
      - name: timezone
        data_type: text
      - name: attendance
        data_type: integer
      - name: home_away
        data_type: text
      - name: encounter_type
        data_type: text
      - name: opponent
        data_type: text
      - name: home_score
        data_type: integer
      - name: away_score
        data_type: integer
      - name: venue_label
        data_type: text
      - name: club_home_club
        data_type: text
      - name: club_home_stadium
        data_type: text
      - name: club_home_stadium_capacity
        data_type: integer
      - name: club_home_reported_total_attendance
        data_type: integer
      - name: club_home_reported_average_attendance
        data_type: integer
      - name: club_home_reported_home_matches
        data_type: integer
      - name: club_home_reported_sold_out_matches
        data_type: integer
      - name: club_home_reported_capacity_pct
        data_type: numeric
      - name: location
        data_type: text
      - name: item
        data_type: text
      - name: amount
        data_type: numeric
        tests:
          - not_null
